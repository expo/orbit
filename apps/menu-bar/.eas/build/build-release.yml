build:
  name: Build and notarize Orbit
  steps:
    - eas/checkout
    - configure_macos_credentials
    - eas/install_node_modules
    - run:
        name: Build packages
        working_directory: ../../
        command: |
          yarn build
    - run:
        name: Archive CLI
        working_directory: ../../apps/cli
        command: |
          yarn archive
    - run:
        name: Codesign CLI
        working_directory: ../../apps/cli
        command: |
          yarn codesign
    - run:
        name: Install menu-bar pods
        working_directory: ./macos
        command: pod install
    - run:
        name: Archive menu-bar
        working_directory: ../../apps/menu-bar
        command: |
          yarn archive
    - run:
        name: Export archive menu-bar
        working_directory: ../../apps/menu-bar
        command: |
          yarn export-local-archive
    - run:
        name: Verify signatures
        working_directory: ../../apps/menu-bar
        command: |
          echo "=== Verify app signature ==="
          codesign --verify --deep --strict -vvv build/Release/Expo\ Orbit.app 2>&1 || true
          echo "=== Main binary ==="
          codesign -dvv build/Release/Expo\ Orbit.app/Contents/MacOS/Expo\ Orbit 2>&1 || true
          echo "=== Sparkle ==="
          codesign -dvv build/Release/Expo\ Orbit.app/Contents/Frameworks/Sparkle.framework 2>&1 || true
          echo "=== Hermes ==="
          codesign -dvv build/Release/Expo\ Orbit.app/Contents/Frameworks/hermes.framework 2>&1 || true
    - run:
        name: zip menu-bar export
        working_directory: ../../apps/menu-bar
        command: |
          ditto -c -k --keepParent build/Release/Expo\ Orbit.app build/Release/ExpoOrbit.zip
    - eas/find_and_upload_build_artifacts
    - run:
        name: Notarize menu-bar
        working_directory: ../../apps/menu-bar
        command: |
          xcrun notarytool submit "build/Release/ExpoOrbit.zip" --apple-id $APPLE_ID_NOTARIZATION_EMAIL --password $APPLE_ID_NOTARIZATION_PASSWORD --team-id "C8D8QTF339" --wait 2>&1 | tee notarize_output.txt
          SUBMISSION_ID=$(grep "id:" notarize_output.txt | head -1 | awk '{print $2}')
          if grep -q "status: Invalid" notarize_output.txt; then
            echo "Notarization failed. Fetching log..."
            xcrun notarytool log "$SUBMISSION_ID" --apple-id $APPLE_ID_NOTARIZATION_EMAIL --password $APPLE_ID_NOTARIZATION_PASSWORD --team-id "C8D8QTF339"
            exit 1
          fi
functions:
  configure_macos_credentials:
    name: Configure macOS Credentials
    path: ./configureMacOSCredentials
