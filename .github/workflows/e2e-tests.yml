name: E2E Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - apps/menu-bar/src/**
      - apps/menu-bar/e2e/**
      - apps/menu-bar/electron/**
      - .github/workflows/e2e-tests.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  electron-e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    name: Electron E2E (${{ matrix.os }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace dependencies
        run: yarn install --frozen-lockfile

      - name: Build packages
        run: yarn build

      - name: Install electron dependencies
        run: yarn install --frozen-lockfile
        working-directory: apps/menu-bar/electron

      - name: Package electron app
        run: yarn package
        working-directory: apps/menu-bar/electron

      - name: Install E2E dependencies
        run: yarn install
        working-directory: apps/menu-bar/e2e

      - name: Run E2E tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum yarn test:electron
        working-directory: apps/menu-bar/e2e

      - name: Run E2E tests (Windows)
        if: runner.os == 'Windows'
        run: yarn test:electron
        working-directory: apps/menu-bar/e2e

  macos-e2e:
    runs-on: macos-15
    name: macOS E2E (Appium mac2)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace dependencies
        run: yarn install --frozen-lockfile

      - name: Build packages
        run: yarn build

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: apps/menu-bar

      - name: 💎 Install Ruby gems
        run: gem install cocoapods xcpretty

      - name: Install CocoaPods
        working-directory: apps/menu-bar/macos
        run: bundle exec pod install

      - name: Build macOS app
        working-directory: apps/menu-bar
        run: |
          xcodebuild build \
            -workspace macos/ExpoMenuBar.xcworkspace \
            -scheme ExpoMenuBar-macOS \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath macos/build \
            | xcpretty

      - name: Install E2E dependencies
        run: yarn install
        working-directory: apps/menu-bar/e2e

      - name: Install Appium mac2 driver
        working-directory: apps/menu-bar/e2e
        run: npx appium driver install mac2

      - name: Run macOS E2E tests
        working-directory: apps/menu-bar/e2e
        env:
          MACOS_APP_PATH: ../macos/build/Build/Products/Release/Expo Orbit.app
        run: yarn test:macos
