name: E2E Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - apps/menu-bar/src/**
      - apps/menu-bar/electron/**
      - apps/menu-bar/e2e/**
      - apps/menu-bar/macos/ExpoMenuBarUITests/**
      - .github/workflows/e2e-tests.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  electron-e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: Electron E2E (${{ matrix.os }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace dependencies
        run: yarn install --frozen-lockfile

      - name: Build packages
        run: yarn build

      - name: Install electron dependencies
        run: yarn install --frozen-lockfile
        working-directory: apps/menu-bar/electron

      - name: Package electron app
        run: yarn package
        working-directory: apps/menu-bar/electron

      - name: Run E2E tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum yarn wdio
        working-directory: apps/menu-bar/electron

      - name: Run E2E tests (Windows)
        if: runner.os == 'Windows'
        run: yarn wdio
        working-directory: apps/menu-bar/electron

  macos-e2e:
    runs-on: macos-14
    name: macOS XCUITest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace dependencies
        run: yarn install --frozen-lockfile

      - name: Build packages
        run: yarn build

      - name: Install CocoaPods
        run: |
          cd apps/menu-bar/macos
          bundle install
          bundle exec pod install

      - name: Setup UI test target
        run: |
          gem install xcodeproj
          ruby apps/menu-bar/macos/scripts/add_ui_test_target.rb

      - name: Build and run UI tests
        run: |
          xcodebuild test \
            -workspace apps/menu-bar/macos/ExpoMenuBar.xcworkspace \
            -scheme ExpoMenuBar-macOS \
            -destination 'platform=macOS' \
            -only-testing:ExpoMenuBarUITests \
            | xcpretty || true
